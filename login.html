<!DOCTYPE html>
<html>
<head>
<title>PhysioCare Login</title>
<link rel="stylesheet" href="loginstyle.css">
</head>

<body>

<div class="container"> <!-- changed from box to container -->

    <div class="top">
        <h1>PhysioCare</h1> <!-- changed h2 to h1 -->
        <p>Clinic Management System</p>
    </div>

    <div class="role">
        <div class="card">
        <img src="patientlogo.jpg" alt="Patient" class="card-img">
        <p>Patient Login</p>
    </div>
       
<div class="card">
        <img src="doctor.jpg" alt="Physio" class="card-img">
        <p>Physio Login</p>
    </div>
        <div class="card">
        <img src="admin.jpg" alt="Admin" class="card-img">
        <p>Admin Login</p>
    </div>    </div>

    <div class="form">
        <input type="text" placeholder="Username"><br>
        <input type="password" placeholder="Password"><br>
        <button>Login</button>
        <p><a href="#">Forgot Password?</a></p>
    </div>

</div>

</body>
</html>
