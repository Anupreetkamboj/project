<HTML>
<HEAD>
<title>login </title>
<style>
body{
background-image:url("retro login page.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
height:100vh;
margin:0px;
}
.loginbox{
width:280px;
margin:50 auto;
top:30%;
position:relative;
padding:25px;
border-radius:12px;
background-color:black;
text-align:center;
box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
background-color: rgba(0, 0, 0, 0.7);
}
input[type="text"], input[type="password"] {
  width: 90%;
  padding: 8px;
  border: none;
  border-radius: 5px;
  margin-bottom: 10px;
}

input[type="submit"] {
  width: 95%;
  padding: 8px;
  border: none;
  border-radius: 5px;
  background-color: #00bfff;
  color: white;
  cursor: pointer;
}

input[type="submit"]:hover {
  background-color: #0099cc;
}
</style>
</HEAD>
<body>
<div class="loginbox">
<form action="listing tags.html">
<input type="text" name="sname" placeholder="enter your registration no."><br><br>
<input type="password" name="pname" placeholder="enter your password">
<br><br>
<input type="submit" value="signin">
</form>
</div>
</body>
</html>
